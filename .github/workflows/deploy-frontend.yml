name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_EMPLOYEE_SERVICE_URL: https://empdir-prod-employee-service.azurewebsites.net
          VITE_DEPARTMENT_SERVICE_URL: https://empdir-prod-department-service.azurewebsites.net

      - name: Add serve package
        working-directory: frontend/build
        run: |
          cat > package.json << 'EOF'
          {
            "name": "frontend",
            "version": "1.0.0",
            "scripts": { "start": "serve -s . -l 8080" },
            "dependencies": { "serve": "14.2.3" }
          }
          EOF
          npm install --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-name: empdirch12-prod-frontend
          publish-profile: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
          package: frontend/build
