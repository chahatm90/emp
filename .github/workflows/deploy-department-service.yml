name: Deploy Department Service

on:
  push:
    branches: [main]
    paths:
      - 'services/department-service/**'
      - '.github/workflows/deploy-department-service.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: services/department-service
        run: mvn clean package -DskipTests -B

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: empdir-prod-department-service
          publish-profile: ${{ secrets.DEPARTMENT_SERVICE_PUBLISH_PROFILE }}
          package: services/department-service/target/*.jar
